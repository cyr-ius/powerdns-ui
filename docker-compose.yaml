services:
  pdns:
    image: powerdns/pdns-auth-50
    restart: unless-stopped
    environment:
      - PDNS_AUTH_API_KEY=${PDNS_AUTH_API_KEY:-change-this-api-key-in-production}
    volumes:
      - powerdns_data:/var/lib/powerdns
      - ./pdns.conf:/etc/powerdns/pdns.d/pdns.conf
    ports:
      # - 53:53
      # - 53:53/udp
      - 8081:8081

  pdns-ui:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - pdns
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PDNS_AUTH_API_URL=${PDNS_AUTH_API_URL:-http://pdns:8081}
      - PDNS_AUTH_API_KEY=${PDNS_AUTH_API_KEY:-change-this-api-key-in-production}
    volumes:
      - powerdns-ui_data:/var/lib/powerdns-ui
    ports:
      - 8080:8080/tcp

volumes:
  powerdns_data:
  powerdns-ui_data:
